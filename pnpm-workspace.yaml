packages:
  - apps/*
  - packages/*

catalog:
  "@types/node": ^25
  "@uploadthing/react": ^7.3.3
  srvx: ^0.11.15
  typescript: ^6
  uploadthing: ^7.7.4
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.20
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zod: ^4.3.6

catalogMode: prefer

overrides:
  babel-preset-solid: 1.9.6
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
