packages:
  - apps/*
  - packages/*

catalogMode: prefer

catalog:
  "@types/node": ^25
  typescript: ^6
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.20
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zod: ^4.3.6

overrides:
  babel-preset-solid: 1.9.6
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
